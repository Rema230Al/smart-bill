<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Upload a receipt or enter its information manually.">
    <title>New Receipt</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/new-receipt.css">
</head>


<body class="app-page">

    <header class="navbar">
        <a href="#" class="logo" aria-label="ReceiptVault home page">ReceiptVault</a>
        <nav class="nav-links" aria-label="Main navigation">
            <a href="#" class="active">Home</a>
            <a href="#">Upload</a>
            <a href="#">All Receipts</a>
            <a href="#">Features</a>
        </nav>
        <div class="nav-actions">
            <a href="#" class="login-link">Log in</a>
            <a href="#" class="btn-dark">Get started</a>
        </div>

    </header>


<main>

        <div>
            <h2>ADD A RECEIPT</h2>
            <p>Upload a photo and the fields fill themselves in, or write it in yourself</p>
        </div>

    <section class="left-sec">
          <div class="zigzag-top"></div>
        <div>
            RECEIPT INFORMATION
        </div>

        <div class="dash-line"></div>

        <div class="sect-info row-2">
            <div>
            <label for="store-name">Store name</label>
            <input id="store-name">
                </div>
            <div>
            <label for="date">Choose Category</label>

            <select class="category">
                <option value="food">Food</option>
                <option value="drink">Drink</option>
                <option value="transport">Transport</option>
                <option value="shopping">Shopping</option>
                <option value="entertainment">Entertainment</option>
            </select>
            </div>
        </div>
    

         <!-- <div class="dash-line"></div> -->

        <div class="sect-info row-2">
                <div>
                    <label for="date">Date</label>
                    <input id="date">
                </div>
                <div>
                    <label for="total">Total</label>
                    <input id="total">
                </div>
        </div>
          
          <!-- <div class="sect-info">
            <label for="date">Choose Category</label>

            <select class="category">
                <option value="food">Food</option>
                <option value="drink">Drink</option>
                <option value="transport">Transport</option>
                <option value="shopping">Shopping</option>
                <option value="entertainment">Entertainment</option>
            </select>
         </div> -->
        <!-- <div class="dash-line"></div> -->

        <div>
           <label for="note">Note</label>
            <textarea id="note">note</textarea>
        </div>

        <div class="dash-line"></div>

        <button class="btn">Save receipt</button>
        
        <div class="zigzag-bottom"></div>
    </section>


    <section class="right-sec">

         <div class="upload">
            <img src="#" alt="upload icon">
            <h3>Add a receipt photo</h3>
            <!-- <p>Choose a file or take a new photo</p> -->

            <div class="upload-options">
                <label for="choose-file" class="upload-btn primary">
                    <i class="ti ti-photo"></i>
                    Choose file
                </label>
                <input type="file" id="choose-file" accept="image/*" style="display: none;">

                <label for="take-photo" class="upload-btn secondary">
                    <i class="ti ti-camera"></i>
                    Take photo
                </label>
                <input type="file" id="take-photo" accept="image/*" capture="environment" style="display: none;">
            </div>
        </div>

        <div class="hint">
            <img src="#" alt="hint icon">
            <p>Field on the left fill in automatically once you upload</p>
        </div>

    </section>



</main>
   
<footer class="site-footer">
    <div class="footer-top">
        <span class="logo">ReceiptVault</span>

         <span class="footer-text">© 2026 Remas Nafea Alsulami</span>

        <div class="footer-social">

            <a href="https://www.linkedin.com/in/remas-alsulami-859569380/" aria-label="LinkedIn"><img src="/assets/linkedin.png"></a>
        </div>
    </div>

   
</footer>
</body>

</html>
